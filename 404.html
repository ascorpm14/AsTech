<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seite nicht gefunden — SteuerGPT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f0f2f5;--surface:#ffffff;--text:#1a1a2e;--text-secondary:#64748b;--primary:#2563eb;--gradient:linear-gradient(135deg,#2563eb,#7c3aed);--transition:all 0.3s cubic-bezier(0.4,0,0.2,1)}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);line-height:1.6;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center}
.error-wrap{max-width:500px}
.error-code{font-size:120px;font-weight:900;background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;margin-bottom:8px}
.error-title{font-size:24px;font-weight:700;margin-bottom:12px}
.error-text{color:var(--text-secondary);font-size:16px;margin-bottom:32px}
.btn-group{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn-primary{display:inline-flex;align-items:center;gap:8px;background:var(--gradient);color:#fff;padding:14px 28px;border-radius:100px;text-decoration:none;font-weight:600;transition:var(--transition);box-shadow:0 4px 14px rgba(37,99,235,0.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(37,99,235,0.4)}
.btn-secondary{display:inline-flex;align-items:center;gap:8px;background:white;color:var(--text);padding:14px 28px;border-radius:100px;text-decoration:none;font-weight:600;border:2px solid #e2e8f0;transition:var(--transition)}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-2px)}
.error-emoji{font-size:64px;margin-bottom:16px}
</style>
</head>
<body>
<div class="error-wrap">
  <div class="error-emoji">🔍</div>
  <div class="error-code">404</div>
  <div class="error-title">Seite nicht gefunden</div>
  <div class="error-text">Die von Ihnen gesuchte Seite existiert leider nicht oder wurde verschoben. Aber keine Sorge — wir helfen Ihnen weiter!</div>
  <div class="btn-group">
    <a href="../" class="btn-primary">← Zur Startseite</a>
    <a href="https://wa.me/261387313415" class="btn-secondary" style="background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;border:none;box-shadow:0 4px 14px rgba(34,197,94,0.3);">💬 Live Chat</a>
  </div>
</div>
</body>
</html>
