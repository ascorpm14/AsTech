<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>@AsTech — KI-Assistent für deutsche Unternehmen</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',-apple-system,sans-serif;background:#0a0e27;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
  .container{max-width:500px}
  h1{font-size:28px;font-weight:800;background:linear-gradient(135deg,#2563eb,#7c3aed);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:16px}
  p{color:#94a3b8;margin-bottom:32px;line-height:1.6}
  .links{display:flex;flex-direction:column;gap:12px}
  a{display:block;padding:14px 24px;border-radius:12px;text-decoration:none;font-weight:600;font-size:15px;transition:all 0.3s}
  a.primary{background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff}
  a.secondary{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.1)}
  a:hover{transform:translateY(-2px);opacity:0.9}
  .footer{margin-top:48px;font-size:12px;color:#475569}
</style>
</head>
<body>
<div class="container">
  <h1>@AsTech</h1>
  <p>Ihr Smartphone wird zum Büro. Wählen Sie Ihre Branche:</p>
  <div class="links">
    <a href="steuerberatung/" class="primary">🏛️ Steuerberatung</a>
    <a href="logistik/" class="secondary">🚚 Logistik & Spedition</a>
    <a href="gesundheitswesen/" class="secondary">🏥 Gesundheitswesen</a>
  </div>
  <div class="footer">© 2026 @AsTech</div>
</div>
</body>
</html>
